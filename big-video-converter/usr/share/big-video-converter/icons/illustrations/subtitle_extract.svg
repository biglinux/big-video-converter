<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Video file (left) -->
  <rect x="8" y="8" width="34" height="44" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <polygon points="18,18 18,30 28,24" fill="#999"/>
  <!-- Subtitle text inside video -->
  <rect x="12" y="36" width="26" height="6" rx="1" fill="#3584e4" opacity="0.3"/>
  <text x="25" y="41" font-family="sans-serif" font-size="4" fill="#3584e4" text-anchor="middle">Hello...</text>
  <rect x="12" y="44" width="18" height="5" rx="1" fill="#3584e4" opacity="0.3"/>
  <text x="21" y="48.5" font-family="sans-serif" font-size="3.5" fill="#3584e4" text-anchor="middle">World</text>
  <!-- Arrow (subtitle leaving) -->
  <line x1="48" y1="40" x2="62" y2="40" stroke="#3584e4" stroke-width="1.5"/>
  <polygon points="62,36 69,40 62,44" fill="#3584e4"/>
  <!-- SRT file (right) -->
  <rect x="74" y="16" width="30" height="36" rx="2" fill="none" stroke="#3584e4" stroke-width="1.5"/>
  <text x="89" y="28" font-family="sans-serif" font-size="7" fill="#3584e4" text-anchor="middle" font-weight="bold">.SRT</text>
  <line x1="79" y1="34" x2="99" y2="34" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="79" y1="38" x2="95" y2="38" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="79" y1="42" x2="97" y2="42" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="79" y1="46" x2="93" y2="46" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Label -->
  <text x="60" y="68" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Extract subtitles to file</text>
</svg>
