<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Fast side (left) -->
  <text x="28" y="10" font-family="sans-serif" font-size="5" fill="#26a269" text-anchor="middle">FAST</text>
  <!-- Short wide progress bar -->
  <rect x="6" y="14" width="44" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="6" y="14" width="44" height="6" rx="3" fill="#26a269"/>
  <!-- Large file below -->
  <rect x="14" y="26" width="28" height="34" rx="2" fill="none" stroke="#999" stroke-width="1.2"/>
  <text x="28" y="46" font-family="sans-serif" font-size="6" fill="#999" text-anchor="middle">BIG</text>
  <!-- Divider -->
  <line x1="60" y1="5" x2="60" y2="65" stroke="#e8e8e8" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Slow side (right) -->
  <text x="90" y="10" font-family="sans-serif" font-size="5" fill="#3584e4" text-anchor="middle">SLOW</text>
  <!-- Long thin progress bar -->
  <rect x="68" y="15" width="44" height="4" rx="2" fill="#e8e8e8"/>
  <rect x="68" y="15" width="22" height="4" rx="2" fill="#3584e4"/>
  <!-- Small file below -->
  <rect x="82" y="30" width="16" height="22" rx="2" fill="none" stroke="#3584e4" stroke-width="1.2"/>
  <text x="90" y="44" font-family="sans-serif" font-size="5" fill="#3584e4" text-anchor="middle">small</text>
  <!-- Label -->
  <text x="60" y="74" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Faster = bigger file, Slower = smaller file</text>
</svg>
