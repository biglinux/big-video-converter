<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Monitor frame -->
  <rect x="20" y="8" width="80" height="48" rx="3" fill="none" stroke="#999" stroke-width="1.5"/>
  <!-- Monitor stand -->
  <line x1="50" y1="58" x2="70" y2="58" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="56" x2="60" y2="58" stroke="#999" stroke-width="1.5"/>
  <!-- Video preview -->
  <rect x="26" y="14" width="68" height="36" rx="1" fill="none" stroke="#999" stroke-width="0.5"/>
  <!-- Play button -->
  <polygon points="52,26 52,38 66,32" fill="#3584e4" fill-opacity="0.6"/>
  <!-- Render mode gears -->
  <circle cx="90" cy="66" r="8" fill="none" stroke="#3584e4" stroke-width="1.2"/>
  <circle cx="90" cy="66" r="3" fill="#3584e4"/>
  <!-- Teeth of gear -->
  <line x1="90" y1="57" x2="90" y2="59" stroke="#3584e4" stroke-width="1.5"/>
  <line x1="90" y1="73" x2="90" y2="75" stroke="#3584e4" stroke-width="1.5"/>
  <line x1="81" y1="66" x2="83" y2="66" stroke="#3584e4" stroke-width="1.5"/>
  <line x1="97" y1="66" x2="99" y2="66" stroke="#3584e4" stroke-width="1.5"/>
  <text x="50" y="74" font-family="sans-serif" font-size="5" fill="#999" text-anchor="middle">Rendering</text>
</svg>
