<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Clapperboard top (stripes) -->
  <rect x="20" y="8" width="50" height="12" rx="2" fill="#999"/>
  <line x1="28" y1="8" x2="24" y2="20" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="38" y1="8" x2="34" y2="20" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="48" y1="8" x2="44" y2="20" stroke="#e8e8e8" stroke-width="3"/>
  <line x1="58" y1="8" x2="54" y2="20" stroke="#e8e8e8" stroke-width="3"/>
  <!-- Clapperboard body -->
  <rect x="20" y="20" width="50" height="30" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <text x="45" y="39" font-family="sans-serif" font-size="7" fill="#999" text-anchor="middle">ProRes</text>
  <!-- Quality star -->
  <polygon points="90,18 93,26 101,26 95,31 97,39 90,34 83,39 85,31 79,26 87,26" fill="#3584e4"/>
  <text x="90" y="50" font-family="sans-serif" font-size="5" fill="#3584e4" text-anchor="middle">HQ</text>
  <!-- Label -->
  <text x="60" y="72" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Professional editing quality</text>
</svg>
