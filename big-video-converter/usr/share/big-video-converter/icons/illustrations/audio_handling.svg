<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Speaker icon -->
  <rect x="10" y="25" width="12" height="16" rx="1" fill="none" stroke="#999" stroke-width="1.5"/>
  <polygon points="22,22 35,12 35,55 22,44" fill="none" stroke="#999" stroke-width="1.5"/>
  <!-- Sound waves -->
  <path d="M40,20 Q48,33 40,48" fill="none" stroke="#3584e4" stroke-width="1.2"/>
  <path d="M46,14 Q58,33 46,54" fill="none" stroke="#3584e4" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Options: keep, remove, re-encode -->
  <rect x="64" y="10" width="46" height="14" rx="2" fill="#3584e4" fill-opacity="0.1" stroke="#3584e4" stroke-width="1"/>
  <text x="87" y="20" font-family="sans-serif" font-size="5.5" fill="#3584e4" text-anchor="middle">Re-encode</text>
  <rect x="64" y="30" width="46" height="14" rx="2" fill="none" stroke="#999" stroke-width="1"/>
  <text x="87" y="40" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Copy</text>
  <rect x="64" y="50" width="46" height="14" rx="2" fill="none" stroke="#999" stroke-width="1"/>
  <text x="87" y="60" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Remove</text>
</svg>
