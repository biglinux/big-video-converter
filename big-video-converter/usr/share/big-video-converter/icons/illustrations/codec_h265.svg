<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Large file icon (left) -->
  <rect x="10" y="10" width="28" height="36" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <text x="24" y="32" font-family="sans-serif" font-size="7" fill="#999" text-anchor="middle">BIG</text>
  <!-- Arrow -->
  <line x1="44" y1="28" x2="58" y2="28" stroke="#3584e4" stroke-width="1.5"/>
  <polygon points="58,24 65,28 58,32" fill="#3584e4"/>
  <!-- Small file icon (right) -->
  <rect x="68" y="16" width="20" height="24" rx="2" fill="none" stroke="#3584e4" stroke-width="1.5"/>
  <text x="78" y="31" font-family="sans-serif" font-size="6" fill="#3584e4" text-anchor="middle">50%</text>
  <!-- Old device with red X -->
  <rect x="96" y="48" width="16" height="12" rx="1" fill="none" stroke="#999" stroke-width="1"/>
  <line x1="93" y1="62" x2="115" y2="62" stroke="#999" stroke-width="1"/>
  <circle cx="111" cy="46" r="5" fill="#e01b24"/>
  <line x1="109" y1="44" x2="113" y2="48" stroke="white" stroke-width="1.5"/>
  <line x1="113" y1="44" x2="109" y2="48" stroke="white" stroke-width="1.5"/>
  <!-- Label -->
  <text x="78" y="50" font-family="sans-serif" font-size="5" fill="#3584e4" text-anchor="middle">H.265</text>
  <text x="60" y="74" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Smaller files, some old devices can't play</text>
</svg>
