<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Video file icon -->
  <rect x="5" y="15" width="24" height="30" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <polygon points="14,25 14,38 23,31.5" fill="#999"/>
  <!-- Arrow -->
  <line x1="34" y1="30" x2="48" y2="30" stroke="#3584e4" stroke-width="1.5"/>
  <polygon points="48,26 55,30 48,34" fill="#3584e4"/>
  <!-- Phone -->
  <rect x="58" y="10" width="12" height="20" rx="2" fill="none" stroke="#999" stroke-width="1.2"/>
  <circle cx="64" cy="27" r="1" fill="#999"/>
  <circle cx="69" cy="8" r="4" fill="#26a269"/>
  <path d="M67,8 L68.5,10 L72,6" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- TV -->
  <rect x="78" y="10" width="20" height="14" rx="1" fill="none" stroke="#999" stroke-width="1.2"/>
  <line x1="84" y1="26" x2="92" y2="26" stroke="#999" stroke-width="1.2"/>
  <circle cx="97" cy="8" r="4" fill="#26a269"/>
  <path d="M95,8 L96.5,10 L100,6" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Laptop -->
  <rect x="68" y="40" width="22" height="14" rx="1" fill="none" stroke="#999" stroke-width="1.2"/>
  <line x1="64" y1="56" x2="94" y2="56" stroke="#999" stroke-width="1.5"/>
  <circle cx="89" cy="38" r="4" fill="#26a269"/>
  <path d="M87,38 L88.5,40 L92,36" stroke="white" stroke-width="1.2" fill="none"/>
  <!-- Label -->
  <text x="17" y="56" font-family="sans-serif" font-size="5" fill="#999" text-anchor="middle">H.264</text>
  <text x="60" y="74" font-family="sans-serif" font-size="6" fill="#26a269" text-anchor="middle">Plays everywhere</text>
</svg>
