<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Grayscale rectangle (left) -->
  <rect x="8" y="14" width="34" height="28" rx="2" fill="none" stroke="#999" stroke-width="1.5"/>
  <rect x="11" y="20" width="8" height="8" fill="#bbb"/>
  <rect x="21" y="20" width="8" height="8" fill="#888"/>
  <rect x="11" y="30" width="8" height="8" fill="#666"/>
  <rect x="21" y="30" width="8" height="8" fill="#aaa"/>
  <!-- Arrow -->
  <line x1="48" y1="28" x2="62" y2="28" stroke="#3584e4" stroke-width="1.5"/>
  <polygon points="62,24 69,28 62,32" fill="#3584e4"/>
  <!-- Colorful rectangle (right) -->
  <rect x="74" y="14" width="34" height="28" rx="2" fill="none" stroke="#3584e4" stroke-width="1.5"/>
  <rect x="77" y="20" width="8" height="8" fill="#e01b24"/>
  <rect x="87" y="20" width="8" height="8" fill="#3584e4"/>
  <rect x="77" y="30" width="8" height="8" fill="#26a269"/>
  <rect x="87" y="30" width="8" height="8" fill="#e5a50a"/>
  <!-- Labels -->
  <text x="25" y="50" font-family="sans-serif" font-size="4.5" fill="#999" text-anchor="middle">Gray</text>
  <text x="91" y="50" font-family="sans-serif" font-size="4.5" fill="#3584e4" text-anchor="middle">Vivid</text>
  <text x="60" y="68" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Adjust color intensity</text>
</svg>
