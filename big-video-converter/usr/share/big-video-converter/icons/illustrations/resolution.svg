<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Large screen (4K) -->
  <rect x="5" y="10" width="44" height="30" rx="2" fill="none" stroke="#3584e4" stroke-width="1.5"/>
  <line x1="20" y1="42" x2="34" y2="42" stroke="#3584e4" stroke-width="1.5"/>
  <line x1="27" y1="40" x2="27" y2="42" stroke="#3584e4" stroke-width="1.5"/>
  <text x="27" y="29" font-family="sans-serif" font-size="10" fill="#3584e4" text-anchor="middle" font-weight="bold">4K</text>
  <!-- Arrow -->
  <line x1="54" y1="28" x2="68" y2="28" stroke="#999" stroke-width="1.5"/>
  <polygon points="68,24 75,28 68,32" fill="#999"/>
  <!-- Small screen (HD) -->
  <rect x="78" y="16" width="30" height="20" rx="2" fill="none" stroke="#26a269" stroke-width="1.5"/>
  <line x1="88" y1="38" x2="98" y2="38" stroke="#26a269" stroke-width="1.5"/>
  <line x1="93" y1="36" x2="93" y2="38" stroke="#26a269" stroke-width="1.5"/>
  <text x="93" y="30" font-family="sans-serif" font-size="8" fill="#26a269" text-anchor="middle" font-weight="bold">HD</text>
  <!-- Dimension hints -->
  <text x="27" y="52" font-family="sans-serif" font-size="4.5" fill="#3584e4" text-anchor="middle">3840×2160</text>
  <text x="93" y="48" font-family="sans-serif" font-size="4.5" fill="#26a269" text-anchor="middle">1920×1080</text>
  <!-- Label -->
  <text x="60" y="72" font-family="sans-serif" font-size="5.5" fill="#999" text-anchor="middle">Change output resolution</text>
</svg>
